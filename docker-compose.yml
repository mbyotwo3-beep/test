version: '3.8'

services:
  # --- MARIA DB DATABASE ENGINE (OPTIMIZED FOR FRAPPE 16) ---
  db:
    image: mariadb:10.11
    container_name: testing_hospital_db
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
    environment:
      MYSQL_ROOT_PASSWORD: hospital_secure_password_2026
    volumes:
      - db-data:/var/lib/mysql
    restart: always

  redis-cache:
    image: redis:7.2-alpine
    container_name: hospital_redis_cache
    restart: always

  redis-queue:
    image: redis:7.2-alpine
    container_name: hospital_redis_queue
    restart: always

  # --- BACKEND SERVER: FRAPPE & MARLEY HEALTH RUNNING VERSION 16 ---
  backend:
    image: frappe/erpnext:v16
    container_name: marley_backend
    ports:
      - "80:8000"    # Exposes the Frappe 16 Patient Booking Website Publicly
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - REDIS_CACHE=redis-cache:6379
      - REDIS_QUEUE=redis-queue:6379
    volumes:
      - assets-data:/home/frappe/frappe-bench/sites
    restart: always

  # --- UNIVERSAL DATA PIPELINE ROUTER (MIRTH CONNECT) ---
  mirth:
    image: nextgenhealthcare/connect:latest
    container_name: mirth_connect
    ports:
      - "8443:8443"  # Secure Mirth Web Interface Access
      - "9000:9000"  # ENTRY 1: Lab Diagnostics / Hematology Analyzers (HL7)
      - "9100:9100"  # ENTRY 2: Large Equipment Systems - MRI & CT Scans (DICOM)
      - "9200:9200"  # ENTRY 3: General Clinical Monitors & Direct IoT (CSV/JSON/Web)
    environment:
      - DATABASE=mariadb
      - DATABASE_URL=jdbc:mariadb://db:3306/mirth_db
      - DATABASE_USERNAME=root
      - DATABASE_PASSWORD=hospital_secure_password_2026
    volumes:
      - mirth-data:/opt/mirth-connect/appdata
    depends_on:
      - db
    restart: always

volumes:
  db-data:
  assets-data:
  mirth-data:
