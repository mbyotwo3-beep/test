version: '3.8'

services:
  # --- 1. STABLE CENTRAL MEDICAL DATABASE ENGINE ---
  db:
    image: mariadb:10.6
    container_name: testing_hospital_db
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
    environment:
      MYSQL_ROOT_PASSWORD: hospital_secure_password_2026
    volumes:
      - db-data:/var/lib/mysql
    restart: always

  redis-cache:
    image: redis:6.2-alpine
    container_name: hospital_redis_cache
    restart: always

  redis-queue:
    image: redis:6.2-alpine
    container_name: hospital_redis_queue
    restart: always

  # --- 2. THE LOGIC ENGINE (Python / Frappe Backend) ---
  backend:
    image: doc0clock-hms:v15
    container_name: hms_backend
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - REDIS_CACHE=redis-cache:6379
      - REDIS_QUEUE=redis-queue:6379
    volumes:
      - sites-data:/home/frappe/frappe-bench/sites
    depends_on:
      - db
    restart: always

  # --- 3. THE FRONTEND UI ENGINE (Nginx) ---
  frontend:
    image: doc0clock-hms:v15
    container_name: hms_frontend
    command:
      - nginx-entrypoint.sh
    environment:
      - BACKEND=backend:8000
      - FRAPPE_SITE_NAME_HEADER=testinghospital.local
      - SOCKETIO=websocket:9000
      - UPSTREAM_REAL_IP_ADDRESS=127.0.0.1
      - UPSTREAM_REAL_IP_HEADER=X-Forwarded-For
      - UPSTREAM_REAL_IP_RECURSIVE=off
    ports:
      - "80:8080"
    volumes:
      - sites-data:/home/frappe/frappe-bench/sites
    depends_on:
      - backend
    restart: always

  # --- 4. REAL-TIME EVENT ENGINE (Websockets) ---
  websocket:
    image: doc0clock-hms:v15
    container_name: hms_websocket
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js
    environment:
      - REDIS_QUEUE=redis-queue:6379
    volumes:
      - sites-data:/home/frappe/frappe-bench/sites
    restart: always

  # --- 5. UNIVERSAL DATA PIPELINE ROUTER (MIRTH CONNECT) ---
  mirth:
    image: nextgenhealthcare/connect:latest
    container_name: mirth_connect
    ports:
      - "8443:8443"
      - "9000:9000"
      - "9100:9100"
      - "9200:9200"
    environment:
      - DATABASE=mariadb
      - DATABASE_URL=jdbc:mariadb://db:3306/mirth_db
      - DATABASE_USERNAME=root
      - DATABASE_PASSWORD=hospital_secure_password_2026
    volumes:
      - mirth-data:/opt/mirth-connect/appdata
    depends_on:
      - db
    restart: always

volumes:
  db-data:
  sites-data:
  mirth-data:
