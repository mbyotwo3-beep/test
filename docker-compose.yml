version: '3.8'

services:
  db:
    image: mariadb:10.6
    container_name: testing_hospital_db
    environment:
      MYSQL_ROOT_PASSWORD: hospital_secure_password_2026
    volumes:
      - db-data:/var/lib/mysql

  backend:
    image: doc0clock-hms:v16
    container_name: hms_backend
    environment:
      - DB_HOST=db
      - DB_PORT=3306
    volumes:
      - sites-data:/home/frappe/frappe-bench/sites
    depends_on:
      - db

  frontend:
    image: doc0clock-hms:v16
    container_name: hms_frontend
    ports:
      - "80:8080"
    volumes:
      - sites-data:/home/frappe/frappe-bench/sites
    depends_on:
      - backend

  # Mirth and Redis services remain the same as your provided file
  redis-cache:
    image: redis:6.2-alpine
    container_name: hospital_redis_cache
  redis-queue:
    image: redis:6.2-alpine
    container_name: hospital_redis_queue
  mirth:
    image: nextgenhealthcare/connect:latest
    container_name: mirth_connect
    ports:
      - "8443:8443"
      - "9000:9000"

volumes:
  db-data:
  sites-data:
  mirth-data:
