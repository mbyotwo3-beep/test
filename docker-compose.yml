version: '3.8'

services:
  db:
    image: mariadb:10.6
    container_name: testing_hospital_db
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: hospital_secure_password_2026
    volumes:
      - db-data:/var/lib/mysql
    restart: always

  redis-cache:
    image: redis:6.2-alpine
    container_name: hospital_redis_cache
    restart: always

  redis-queue:
    image: redis:6.2-alpine
    container_name: hospital_redis_queue
    restart: always

  backend:
    image: doc0clock-hms:v16
    container_name: hms_backend
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - REDIS_CACHE=redis://redis-cache:6379
      - REDIS_QUEUE=redis://redis-queue:6379
    volumes:
      - sites-data:/home/frappe/frappe-bench/sites
    depends_on:
      - db
      - redis-cache
      - redis-queue
    restart: always

  frontend:
    image: doc0clock-hms:v16
    container_name: hms_frontend
    ports:
      - "80:8080"
    volumes:
      - sites-data:/home/frappe/frappe-bench/sites
    depends_on:
      - backend
    restart: always

volumes:
  db-data:
  sites-data:
